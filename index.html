<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timestamp Checker</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      white-space: pre-line;
    }
  </style>
</head>
<body>

<h2>Проверка timestamp из readme.md</h2>

<div id="result">Загрузка...</div>

<script>
async function checkTimestamp() {
  const result = document.getElementById("result");

  try {
    // Загружаем readme.md
    const response = await fetch("/readme.md");
    const text = await response.text();

    // Ищем строку:
    // <timestamp, "+01.01.2026-12:34:56+">
    const regex = /<timestamp,\s*(\d{2}\.\d{2}\.\d{4}-\d{2}:\d{2}:\d{2})\/>/;
    const match = text.match(regex);

    if (!match) {
      result.textContent = "timestamp not found";
      return;
    }

    const timestampStr = match[1];

    // Парсим дату
    const [
      datePart,
      timePart
    ] = timestampStr.split("-");

    const [day, month, year] = datePart.split(".").map(Number);
    const [hours, minutes, seconds] = timePart.split(":").map(Number);

    const targetDate = new Date(
      year,
      month - 1,
      day,
      hours,
      minutes,
      seconds
    );

    const now = new Date();

    // Разница в миллисекундах
    const diff = targetDate - now;

    if (diff <= 0) {
      result.textContent = "timestamp expired";
      return;
    }

    // Переводим разницу во время
    const totalSeconds = Math.floor(diff / 1000);

    const days = Math.floor(totalSeconds / 86400);
    const hoursLeft = Math.floor((totalSeconds % 86400) / 3600);
    const minutesLeft = Math.floor((totalSeconds % 3600) / 60);
    const secondsLeft = totalSeconds % 60;

    result.textContent =
      `${timestampStr} - ${now.toLocaleString("ru-RU")}\n\n` +
      `Осталось:\n` +
      `${days} дн. ${hoursLeft} ч. ${minutesLeft} мин. ${secondsLeft} сек.`;

  } catch (err) {
    result.textContent = "Ошибка: " + err;
  }
}

checkTimestamp();
setInterval(checkTimestamp, 1000);
</script>

</body>
</html>
